[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "immersivecommons"
version = "0.1.0"
description = "Thin, spec-derived Python client for the Immersive Commons Agent REST API."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Immersive Commons", email = "admin@immersivecommons.com" }]
keywords = ["immersive-commons", "ai-agents", "mcp", "openapi", "rest-client"]
dependencies = []
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Intended Audience :: Developers",
]

[project.urls]
Homepage = "https://www.immersivecommons.com"
Documentation = "https://www.immersivecommons.com/developers"
Source = "https://github.com/RayyanZahid/ic-skills"

[tool.hatch.build.targets.wheel]
packages = ["immersivecommons"]

[tool.hatch.build.targets.wheel.force-include]
"immersivecommons/openapi.json" = "immersivecommons/openapi.json"

[tool.hatch.build.targets.sdist]
include = ["immersivecommons", "scripts", "tests", "README.md"]
